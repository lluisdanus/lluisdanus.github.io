<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Lluís Danús | {{ page.title }}</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/assets/style.css">
  
  <link
  rel="stylesheet"
  href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
  integrity="sha512-..."
  crossorigin="anonymous"
  referrerpolicy="no-referrer"
  />

</head>
<body>

<header class="site-header">
  <div class="container">
    <div class="site-name">
      <a href="{{ '/' | relative_url }}">Lluís Danús</a>
    </div>

    <nav class="site-nav">
      <a href="{{ '/' | relative_url }}" class="{% if page.url == '/' %}active{% endif %}">About</a>
      <a href="{{ '/research' | relative_url }}" class="{% if page.url contains '/research' %}active{% endif %}">Research</a>
      <a href="{{ '/publications' | relative_url }}" class="{% if page.url contains '/publications' %}active{% endif %}">Publications</a>
      <a href="{{ '/cv' | relative_url }}" class="{% if page.url contains '/cv' %}active{% endif %}">CV</a>
      <a href="{{ '/news' | relative_url }}" class="{% if page.url contains '/news' %}active{% endif %}">News</a>
    </nav>
  </div>
</header>

<main class="content">
  {{ content }}
</main>

<footer class="site-footer">
  © {{ site.time | date: "%Y" }} {{ site.title }}
</footer>

<script>
function toggleAbstract(id) {
  var el = document.getElementById("abs-" + id);
  if (el.style.display === "block") {
    el.style.display = "none";
  } else {
    el.style.display = "block";
  }
}
</script>

</body>
</html>
