  />

<body>

<header class="site-header">
  <div class="header-inner">
    <h1>{{ site.title }}</h1>
    <p class="subtitle">

<div class="icons">

  <a href="https://github.com/lluisdanus" aria-label="GitHub">

  <a href="https://www.linkedin.com/in/lluisdanus/" aria-label="LinkedIn">

  </a>
</div>

    <nav>

    </nav>
  </div>
</header>

<main class="content">
  {{ content }}
</main>

<footer class="site-footer">
  © {{ site.time | date: "%Y" }} {{ site.title }}
</footer>

<script>
function toggleAbstract(id) {
  var el = document.getElementById("abs-" + id);
  if (el.style.display === "block") {
    el.style.display = "none";
  } else {
    el.style.display = "block";
  }
}
</script>

</body>
</html>
