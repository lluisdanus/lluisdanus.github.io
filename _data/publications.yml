- id: cabanas25
  title: Human mobility is well described by closed-form gravity-like models learned
    automatically from data
  authors: Cabanas-Tirapu, Oriol and Danús, Lluís and Moro, Esteban and Sales-Pardo,
    Marta and Guimerà, Roger
  journal: Nature Communications
  year: '2025'
  doi: 10.1038/s41467-025-56495-5
  abstract: Modeling human mobility is critical to address questions in urban planning,
    sustainability, public health, and economic development. However, our understanding
    and ability to model flows between urban areas are still incomplete. At one end
    of the modeling spectrum we have gravity models, which are easy to interpret but
    provide modestly accurate predictions of flows. At the other end, we have machine
    learning models, with tens of features and thousands of parameters, which predict
    mobility more accurately than gravity models but do not provide clear insights
    on human behavior. Here, we show that simple machine-learned, closed-form models
    of mobility can predict mobility flows as accurately as complex machine learning
    models, and extrapolate better. Moreover, these models are simple and gravity-like,
    and can be interpreted similarly to standard gravity models. These models work
    for different datasets and at different scales, suggesting that they may capture
    the fundamental universal features of human mobility.
- id: danus23
  title: Differences in collaboration structures and impact among prominent researchers
    in Europe and North America
  authors: Danús, Lluís and Muntaner, Carles and Krauss, Alexander and Sales-Pardo,
    Marta and Guimerà, Roger
  journal: EPJ Data Science
  year: '2023'
  doi: 10.1140/epjds/s13688-023-00378-6
  abstract: Scientists collaborate through intricate networks, which impact the quality
    and scope of their research. At the same time, funding and institutional arrangements,
    as well as scientific and political cultures, affect the structure of collaboration
    networks. Since such arrangements and cultures differ across regions in the world
    in systematic ways, we surmise that collaboration networks and impact should also
    differ systematically across regions. To test this, we compare the structure of
    collaboration networks among prominent researchers in North America and Europe.
    We find that prominent researchers in Europe establish denser collaboration networks,
    whereas those in North America establish more decentralized networks. We also
    find that the impact of the publications of prominent researchers in North America
    is significantly higher than for those in Europe, both when they collaborate with
    other prominent researchers and when they do not. Although Europeans collaborate
    with other prominent researchers more often, which increases their impact, we
    also find that repeated collaboration among prominent researchers decreases the
    synergistic effect of collaborating.
- id: krauss23
  title: Early-career factors largely determine the future impact of prominent researchers
  authors: Krauss, Alexander and Danús, Lluís and Sales-Pardo, Marta
  journal: Scientific Reports
  year: '2023'
  doi: 10.1038/s41598-023-46050-x
